version: "3.8"

services:
  gateway:
    build: .
    container_name: llm-scheduler
    ports:
      - "8001:8001"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - gateway-data:/app/data
    environment:
      - LLM_GATEWAY_CONFIG=/app/config.yaml
    restart: unless-stopped

volumes:
  gateway-data:
