server:
  host: "0.0.0.0"
  port: 8001

auth:
  enabled: true

admin:
  enabled: true
  username: "admin"
  password: "admin123"

database:
  path: "data/gateway.db"

queue:
  max_length: 5
  concurrency: 1

priority:
  strategy: "api_key"  # "api_key" | "ip_based"
  default_priority: 100
  ip_mapping:
    "192.168.1.100": 1
    "10.0.0.0/24": 50

backend:
  base_url: "http://localhost:11434/v1"
  api_key: "sk-backend-key"
  timeout: 300

logging:
  level: "INFO"
  format: "json"  # "json" | "text"

debug:
  enabled: false
  dir: "data/debug"

metrics:
  enabled: true
